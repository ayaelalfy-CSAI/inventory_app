apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit-deployment
  namespace: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit:latest

        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"

        ports:
          - containerPort: 1025  
            name: smtp
          - containerPort: 8025  
            name: web-ui
