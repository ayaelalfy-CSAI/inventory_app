apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin-deployment
  namespace: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
    
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-svc -p 5432 -U admin;
              do echo "Waiting for postgres..."; sleep 2; done
              echo "Postgres is ready!"
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:latest
          ports:
            - containerPort: 80    
              name: web-ui
          envFrom:
            - secretRef:
                name: pgadmin-secret
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "128Mi"
              cpu: "100m"